name: Deploy to OutSystems ODC

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - '.github/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: false
        default: 'Development'
        type: string

env:
  DOTNET_VERSION: '8.0.x'
  PROJECT_FILE: 'EdiParserLibrary.csproj'
  ARTIFACT_NAME: 'EdiParserLibrary'
  ZIP_FILE_BASE: 'EdiParserLibrary'
  LIBRARY_DISPLAY_NAME: 'EdiParser'

jobs:
  # ============================================================================
  # BUILD
  # ============================================================================
  build:
    name: Build External Logic Library
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Inject Build Metadata
        shell: pwsh
        run: |
          $timestamp  = (Get-Date).ToUniversalTime().ToString("yyyy-MM-dd HH:mm:ss UTC")
          $runNumber  = "${{ github.run_number }}"
          $commitShort = "${{ github.sha }}".Substring(0, 7)
          $buildMetadata = "Run #$runNumber | $timestamp | Commit $commitShort"

          Write-Host "Injecting: $buildMetadata"

          $path    = "EdiParser.cs"
          $content = Get-Content $path -Raw
          $content = $content -replace 'BUILD_METADATA_PLACEHOLDER', $buildMetadata
          $content | Out-File -FilePath $path -Encoding UTF8 -NoNewline

          Write-Host "Build metadata injected into GetBuildVersion()"

      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_FILE }}

      - name: Build project
        shell: pwsh
        run: |
          dotnet build ${{ env.PROJECT_FILE }} `
            --configuration Release `
            --no-restore `
            -p:Version=0.1.${{ github.run_number }} `
            -p:AssemblyVersion=0.1.${{ github.run_number }}.0 `
            -p:FileVersion=0.1.${{ github.run_number }}.0 `
            -p:Deterministic=false

      - name: Publish for linux-x64 (ODC Lambda)
        shell: pwsh
        run: |
          dotnet publish ${{ env.PROJECT_FILE }} `
            --configuration Release `
            --runtime linux-x64 `
            --output ./publish `
            --no-build `
            -p:Version=0.1.${{ github.run_number }} `
            -p:AssemblyVersion=0.1.${{ github.run_number }}.0 `
            -p:FileVersion=0.1.${{ github.run_number }}.0 `
            -p:Deterministic=false

      - name: Create deployment ZIP
        id: create_zip
        shell: pwsh
        run: |
          $zipFile = "${{ env.ZIP_FILE_BASE }}-${{ github.run_number }}.zip"
          if (Test-Path $zipFile) { Remove-Item $zipFile -Force }
          Compress-Archive -Path ./publish/* -DestinationPath $zipFile -Force

          if (Test-Path $zipFile) {
            $size = (Get-Item $zipFile).Length / 1MB
            Write-Host "ZIP created: $zipFile ($($size.ToString('F2')) MB)"
            "ZIP_FILE=$zipFile" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } else {
            Write-Error "Failed to create ZIP"; exit 1
          }

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}-${{ github.run_number }}
          path: ${{ steps.create_zip.outputs.ZIP_FILE }}
          retention-days: 30
          if-no-files-found: error

  # ============================================================================
  # DEPLOY
  # ============================================================================
  deploy:
    name: Deploy to ODC Development
    runs-on: windows-latest
    needs: build
    environment: development

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}-${{ github.run_number }}

      - name: Verify artifact
        id: verify_zip
        shell: pwsh
        run: |
          $zipFile = "${{ env.ZIP_FILE_BASE }}-${{ github.run_number }}.zip"
          if (Test-Path $zipFile) {
            $size = (Get-Item $zipFile).Length / 1MB
            Write-Host "Artifact found: $zipFile ($($size.ToString('F2')) MB)"
            "ZIP_FILE=$zipFile" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } else {
            Write-Error "Artifact not found: $zipFile"; exit 1
          }

      # ── Step 1: Authenticate ──────────────────────────────────────────────
      - name: "Step 1: Authenticate with ODC"
        id: auth
        shell: pwsh
        run: |
          Write-Host "Authenticating with ODC..."

          # OIDC discovery
          $discoveryUrl = "${{ secrets.ODC_PORTAL_URL }}/identity/.well-known/openid-configuration"
          try {
            $discovery    = Invoke-RestMethod -Uri $discoveryUrl -Method Get -UseBasicParsing
            $tokenEndpoint = $discovery.token_endpoint
            Write-Host "Token endpoint: $tokenEndpoint"
          } catch {
            Write-Host "OIDC discovery failed, using fallback endpoint"
            $tokenEndpoint = "${{ secrets.ODC_PORTAL_URL }}/auth/realms/29ecfa4f-ec23-4ebe-8d8c-6d556d1daba4/protocol/openid-connect/token"
          }

          # Request token
          $body = @{
            grant_type    = "client_credentials"
            client_id     = "${{ secrets.ODC_CLIENT_ID }}"
            client_secret = "${{ secrets.ODC_CLIENT_SECRET }}"
          }
          $response    = Invoke-WebRequest -Uri $tokenEndpoint -Method Post -Body $body -ContentType "application/x-www-form-urlencoded" -UseBasicParsing
          $parsed      = $response.Content | ConvertFrom-Json
          $accessToken = $parsed.access_token

          if ([string]::IsNullOrEmpty($accessToken)) { throw "Access token is empty" }

          Write-Host "Authentication successful (token length: $($accessToken.Length))"
          "ACCESS_TOKEN=$accessToken" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "::add-mask::$accessToken"

      # ── Step 2: Get pre-signed upload URL ────────────────────────────────
      - name: "Step 2: Get Upload URL"
        id: upload_url
        shell: pwsh
        env:
          ACCESS_TOKEN: ${{ steps.auth.outputs.ACCESS_TOKEN }}
        run: |
          $apiUrl  = "${{ secrets.ODC_PORTAL_URL }}/api/external-libraries/v1/uploads"
          $headers = @{ "Authorization" = "Bearer $env:ACCESS_TOKEN" }

          $response    = Invoke-RestMethod -Uri $apiUrl -Method Get -Headers $headers
          $uploadUrl   = $response.uploadUrl
          $downloadUrl = $response.downloadUrl

          if ([string]::IsNullOrEmpty($uploadUrl) -or [string]::IsNullOrEmpty($downloadUrl)) {
            throw "Missing uploadUrl or downloadUrl in response"
          }

          Write-Host "Pre-signed URLs obtained"
          "UPLOAD_URL=$uploadUrl"     | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "DOWNLOAD_URL=$downloadUrl" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "::add-mask::$uploadUrl"
          Write-Host "::add-mask::$downloadUrl"

      # ── Step 3: Upload ZIP to S3 ──────────────────────────────────────────
      - name: "Step 3: Upload ZIP to S3"
        shell: pwsh
        env:
          UPLOAD_URL: ${{ steps.upload_url.outputs.UPLOAD_URL }}
          ZIP_FILE:   ${{ steps.verify_zip.outputs.ZIP_FILE }}
        run: |
          $zipBytes = [System.IO.File]::ReadAllBytes((Resolve-Path $env:ZIP_FILE))
          $headers  = @{ "Content-Type" = "application/zip" }
          Invoke-RestMethod -Uri $env:UPLOAD_URL -Method Put -Headers $headers -Body $zipBytes | Out-Null
          Write-Host "ZIP uploaded to S3 ($([Math]::Round($zipBytes.Length / 1MB, 2)) MB)"

      # ── Step 4: Start generation operation ───────────────────────────────
      - name: "Step 4: Start Generation Operation"
        id: start_generation
        shell: pwsh
        env:
          ACCESS_TOKEN: ${{ steps.auth.outputs.ACCESS_TOKEN }}
          DOWNLOAD_URL: ${{ steps.upload_url.outputs.DOWNLOAD_URL }}
          ZIP_FILE:     ${{ steps.verify_zip.outputs.ZIP_FILE }}
        run: |
          $apiUrl  = "${{ secrets.ODC_PORTAL_URL }}/api/external-libraries/v1/generation-operations/"
          $headers = @{
            "Authorization" = "Bearer $env:ACCESS_TOKEN"
            "Content-Type"  = "application/json"
          }
          $body = @{
            fileName          = $env:ZIP_FILE
            highCodeBinaryUri = $env:DOWNLOAD_URL
          } | ConvertTo-Json

          $response     = Invoke-RestMethod -Uri $apiUrl -Method Post -Headers $headers -Body $body
          $operationKey = $response.operationKey

          if ([string]::IsNullOrEmpty($operationKey)) { throw "No operationKey in response" }

          Write-Host "Generation operation started: $operationKey"
          "OPERATION_KEY=$operationKey" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      # ── Step 5: Poll status ───────────────────────────────────────────────
      - name: "Step 5: Poll Generation Status"
        id: poll_operation
        shell: pwsh
        env:
          ACCESS_TOKEN:  ${{ steps.auth.outputs.ACCESS_TOKEN }}
          OPERATION_KEY: ${{ steps.start_generation.outputs.OPERATION_KEY }}
        run: |
          $apiUrl  = "${{ secrets.ODC_PORTAL_URL }}/api/external-libraries/v1/generation-operations/$env:OPERATION_KEY"
          $headers = @{ "Authorization" = "Bearer $env:ACCESS_TOKEN" }

          $maxAttempts = 60
          $attempt     = 0
          $status      = $null
          $libraryKey  = $null

          while ($attempt -lt $maxAttempts) {
            $attempt++
            $response   = Invoke-RestMethod -Uri $apiUrl -Method Get -Headers $headers
            $status     = $response.status
            $libraryKey = $response.libraryKey
            Write-Host "Attempt $attempt — Status: $status"

            if ($status -eq "Completed") {
              Write-Host "Generation completed. Library key: $libraryKey"
              break
            } elseif ($status -eq "ReadyForReview") {
              Write-Host "Upload complete — manual approval required in ODC Portal"
              Write-Host "Go to: ${{ secrets.ODC_PORTAL_URL }} → Libraries → External Libraries"
              $libraryUri = $response.libraryUri
              if ($libraryUri) {
                Write-Host "Direct link: $libraryUri"
                "LIBRARY_URI=$libraryUri" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
              }
              break
            } elseif ($status -eq "Failed") {
              Write-Host ($response | ConvertTo-Json -Depth 5)
              throw "Library generation failed"
            } else {
              Start-Sleep -Seconds 5
            }
          }

          if ($status -ne "Completed" -and $status -ne "ReadyForReview") {
            throw "Generation did not complete within timeout. Final status: $status"
          }

          "STATUS=$status" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          if (-not [string]::IsNullOrEmpty($libraryKey)) {
            "LIBRARY_KEY=$libraryKey" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }

      # ── Step 6: Tag revision (auto-increments patch version) ─────────────
      - name: "Step 6: Tag Library Revision"
        id: tag_revision
        if: steps.poll_operation.outputs.STATUS == 'Completed'
        shell: pwsh
        env:
          ACCESS_TOKEN: ${{ steps.auth.outputs.ACCESS_TOKEN }}
          LIBRARY_KEY:  ${{ steps.poll_operation.outputs.LIBRARY_KEY }}
        run: |
          $headers = @{
            "Authorization" = "Bearer $env:ACCESS_TOKEN"
            "Content-Type"  = "application/json"
          }

          # Get all revisions to find latest and compute next version tag
          $revisionsUrl = "${{ secrets.ODC_PORTAL_URL }}/api/asset-repository/v1/assets/$env:LIBRARY_KEY/revisions"
          $response     = Invoke-RestMethod -Uri $revisionsUrl -Method Get -Headers $headers
          $revisions    = $response.results

          $latestRevision = $revisions | Sort-Object -Property {
            if ($_.revisionNumber) { $_.revisionNumber }
            elseif ($_.revision) { $_.revision }
            else { 0 }
          } -Descending | Select-Object -First 1

          $revisionNumber = if ($latestRevision.revisionNumber) { $latestRevision.revisionNumber }
                           elseif ($latestRevision.revision) { $latestRevision.revision }
                           else { $null }

          if ([string]::IsNullOrEmpty($revisionNumber)) { throw "Could not determine revision number" }

          # Auto-increment patch version
          $allTags = $revisions | Where-Object { $_.tag } | Select-Object -ExpandProperty tag | Sort-Object -Descending
          if ($allTags.Count -gt 0 -and $allTags[0] -match '^(\d+)\.(\d+)\.(\d+)') {
            $newTag = "$([int]$matches[1]).$([int]$matches[2]).$([int]$matches[3] + 1)"
          } else {
            $newTag = "0.1.0"
          }

          Write-Host "Tagging revision $revisionNumber as $newTag"

          $body = @{
            tag          = $newTag
            releaseNotes = "Automated deployment — Run #${{ github.run_number }} | Commit ${{ github.sha }}"
          } | ConvertTo-Json

          $tagUrl = "${{ secrets.ODC_PORTAL_URL }}/api/asset-repository/v1/assets/$env:LIBRARY_KEY/revisions/$revisionNumber"
          Invoke-RestMethod -Uri $tagUrl -Method Patch -Headers $headers -Body $body | Out-Null

          Write-Host "Tagged as $newTag"
          "VERSION_TAG=$newTag"           | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "REVISION_NUMBER=$revisionNumber" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      # ── Summaries ─────────────────────────────────────────────────────────
      - name: Summary (Deployed)
        if: success() && steps.poll_operation.outputs.STATUS == 'Completed'
        shell: pwsh
        env:
          LIBRARY_KEY:     ${{ steps.poll_operation.outputs.LIBRARY_KEY }}
          REVISION_NUMBER: ${{ steps.tag_revision.outputs.REVISION_NUMBER }}
          VERSION_TAG:     ${{ steps.tag_revision.outputs.VERSION_TAG }}
        run: |
          Write-Output "## Deployment Successful" >> $env:GITHUB_STEP_SUMMARY
          Write-Output "- **Library:** ${{ env.LIBRARY_DISPLAY_NAME }}" >> $env:GITHUB_STEP_SUMMARY
          Write-Output "- **Version:** $env:VERSION_TAG" >> $env:GITHUB_STEP_SUMMARY
          Write-Output "- **Revision:** $env:REVISION_NUMBER" >> $env:GITHUB_STEP_SUMMARY
          Write-Output "- **Library Key:** ``$env:LIBRARY_KEY``" >> $env:GITHUB_STEP_SUMMARY
          Write-Output "- **Portal:** ${{ secrets.ODC_PORTAL_URL }}" >> $env:GITHUB_STEP_SUMMARY
          Write-Output "- **Run:** #${{ github.run_number }}" >> $env:GITHUB_STEP_SUMMARY

      - name: Summary (Awaiting Approval)
        if: success() && steps.poll_operation.outputs.STATUS == 'ReadyForReview'
        shell: pwsh
        env:
          LIBRARY_URI: ${{ steps.poll_operation.outputs.LIBRARY_URI }}
        run: |
          Write-Output "## Upload Complete — Approval Required" >> $env:GITHUB_STEP_SUMMARY
          Write-Output "Library uploaded and processed. Manual security review required." >> $env:GITHUB_STEP_SUMMARY
          Write-Output "" >> $env:GITHUB_STEP_SUMMARY
          Write-Output "1. Go to [${{ secrets.ODC_PORTAL_URL }}](${{ secrets.ODC_PORTAL_URL }})" >> $env:GITHUB_STEP_SUMMARY
          Write-Output "2. Libraries → External Libraries" >> $env:GITHUB_STEP_SUMMARY
          Write-Output "3. Find **${{ env.LIBRARY_DISPLAY_NAME }}** → Approve" >> $env:GITHUB_STEP_SUMMARY
          if (-not [string]::IsNullOrEmpty($env:LIBRARY_URI)) {
            Write-Output "4. Or use [direct link]($env:LIBRARY_URI)" >> $env:GITHUB_STEP_SUMMARY
          }

      - name: Summary (Failed)
        if: failure()
        shell: pwsh
        run: |
          Write-Output "## Deployment Failed" >> $env:GITHUB_STEP_SUMMARY
          Write-Output "Check the workflow logs for error details." >> $env:GITHUB_STEP_SUMMARY
          Write-Output "- Step 1 fail: Check ODC_CLIENT_ID / ODC_CLIENT_SECRET secrets" >> $env:GITHUB_STEP_SUMMARY
          Write-Output "- Step 2 fail: Check API client has Asset management > Create permission" >> $env:GITHUB_STEP_SUMMARY
          Write-Output "- Step 4 fail: Check ZIP structure / missing DLLs" >> $env:GITHUB_STEP_SUMMARY
          Write-Output "- Step 5 fail: Generation error — check ODC Portal for compilation logs" >> $env:GITHUB_STEP_SUMMARY
